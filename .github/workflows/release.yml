name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: blacksmith-2vcpu-windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          shared-key: 'tauri-windows-release'

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Setting version to $version"

          # tauri.conf.json
          $cfgPath = 'src-tauri/tauri.conf.json'
          $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
          $cfg.version = $version
          $cfg | ConvertTo-Json -Depth 32 | Set-Content $cfgPath -Encoding utf8

          # Cargo.toml — update only the [package] version line
          $toml = Get-Content 'src-tauri/Cargo.toml'
          $toml = $toml -replace '^version = ".*"', "version = `"$version`""
          Set-Content 'src-tauri/Cargo.toml' $toml -Encoding utf8

      - name: Build & release Tauri Windows installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TRV Timer ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            * `*-setup.exe` — NSIS installer (empfohlen)
            * `*.msi` — MSI-Paket (für Gruppenrichtlinien-Verteilung)

            Beim ersten Start wird, falls nötig, automatisch Microsoft WebView2
            heruntergeladen und installiert.
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles msi,nsis
          projectPath: '.'
          tauriScript: 'npx tauri'
