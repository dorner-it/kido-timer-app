name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            runner: blacksmith-2vcpu-windows-2025
            target: x86_64-pc-windows-msvc
            extra_args: ''
          - label: macOS
            runner: macos-14
            target: universal-apple-darwin
            extra_args: ''
          - label: Linux
            runner: blacksmith-4vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
            extra_args: '--bundles deb,rpm'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      # macOS universal builds need both Apple-Silicon and Intel rustup
      # targets installed before tauri can lipo them together.
      - name: Add macOS architecture targets
        if: matrix.label == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          shared-key: 'tauri-${{ matrix.label }}-release'

      # WebKitGTK 4.1 + bundler tools (deb is built from `dpkg-deb`,
      # rpm is built from `rpmbuild`).
      - name: Install Linux dependencies
        if: matrix.label == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            file \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Setting version to $version"

          # tauri.conf.json
          $cfgPath = 'src-tauri/tauri.conf.json'
          $cfg = Get-Content $cfgPath -Raw | ConvertFrom-Json
          $cfg.version = $version
          $cfg | ConvertTo-Json -Depth 32 | Set-Content $cfgPath -Encoding utf8

          # Cargo.toml — update only the [package] version line
          $toml = Get-Content 'src-tauri/Cargo.toml'
          $toml = $toml -replace '^version = ".*"', "version = `"$version`""
          Set-Content 'src-tauri/Cargo.toml' $toml -Encoding utf8

      - name: Build & release Tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KiDo-Timer ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            ### Windows
            * `*-setup.exe` — NSIS-Installer (empfohlen)
            * `*.msi` — MSI-Paket (für Gruppenrichtlinien-Verteilung)
            * Microsoft WebView2 wird beim ersten Start ggf. automatisch
              heruntergeladen und installiert.

            ### macOS
            * `*.dmg` — Disk-Image (Universal Build, Apple Silicon + Intel)
            * Beim ersten Start ggf. via Rechtsklick → "Öffnen", da
              die Anwendung nicht notarisiert ist.

            ### Linux
            * `*.deb` — Debian / Ubuntu-Paket (Ubuntu 22.04+, Debian 12+)
            * `*.rpm` — Fedora / openSUSE-Paket
            * Erfordert WebKitGTK 4.1 (`libwebkit2gtk-4.1-0`).

            `latest.json` ist das Manifest für die automatische
            Update-Funktion; bestehende Installationen erkennen
            dieses Release automatisch.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} ${{ matrix.extra_args }}
          projectPath: '.'
          tauriScript: 'npx tauri'
